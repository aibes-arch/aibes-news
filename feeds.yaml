# 技术情报 Agent 源配置
# 每个源包含：name, url, type, category, enabled, max_items
# type: rss | api | html（目前主要实现 rss）
# category 为默认分类，最终分类由 classifier 重新判定

official:
  name: 官方源
  sources:
    - name: OpenAI News
      url: https://openai.com/news/rss.xml
      type: rss
      enabled: true
      max_items: 15
    - name: Anthropic News
      url: https://www.anthropic.com/news/rss.xml
      type: rss
      enabled: true
      max_items: 15
    - name: Google AI Blog
      url: https://ai.googleblog.com/feeds/posts/default
      type: rss
      enabled: true
      max_items: 15
    - name: Microsoft Research
      url: https://www.microsoft.com/en-us/research/feed/
      type: rss
      enabled: true
      max_items: 15
    - name: Meta AI Blog
      url: https://ai.meta.com/blog/rss/
      type: rss
      enabled: true
      max_items: 15
    - name: NVIDIA Blog
      url: https://blogs.nvidia.com/blog/feed/
      type: rss
      enabled: true
      max_items: 15
    - name: GitHub Blog
      url: https://github.blog/feed/
      type: rss
      enabled: true
      max_items: 15

